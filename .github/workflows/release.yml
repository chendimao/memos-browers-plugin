name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p \"require('./package.json').version\")"
          NORMALIZED_TAG="${TAG#v}"

          if [ "${NORMALIZED_TAG}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG} 与 package.json 版本 ${PACKAGE_VERSION} 不一致"
            exit 1
          fi

      - name: Build all targets
        run: npm run build

      - name: Verify build output
        run: npm run verify:build

      - name: Package release assets
        run: node scripts/package-release-assets.mjs --version "${GITHUB_REF_NAME}"

      - name: Create or update GitHub Release
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="Memos Quick Note ${TAG#v}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TITLE}"
          else
            gh release create "${TAG}" --title "${TITLE}" --generate-notes
          fi

          gh release upload "${TAG}" release-assets/*.zip --clobber
